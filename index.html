<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi3D KOL 郵件助手</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1a2233; --sub:#66708a;
    --accent:#3556e0; --accent-soft:#eef1fd; --line:#e3e6ee;
    --ok:#1d9e6f; --warn:#c7742c; --radius:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Segoe UI","Microsoft JhengHei","PingFang TC","Hiragino Sans","Yu Gothic UI",sans-serif;
    font-size:14px; line-height:1.6;
  }
  .wrap{max-width:1200px; margin:0 auto; padding:20px 16px 60px;}
  header{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  header h1{font-size:20px; font-weight:700;}
  header h1 span{color:var(--accent);}
  .tabs{display:flex; gap:8px;}
  .tab-btn{
    padding:8px 18px; border:1px solid var(--line); background:var(--card);
    border-radius:999px; cursor:pointer; font-size:14px; color:var(--sub);
  }
  .tab-btn.active{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
  .gear{cursor:pointer; padding:8px 14px; border:1px solid var(--line); background:var(--card); border-radius:999px; color:var(--sub);}
  .layout{display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:16px;}
  @media(max-width:900px){.layout{grid-template-columns:1fr;}}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px;}
  .card h2{font-size:15px; margin-bottom:12px; color:var(--ink);}
  label{display:block; font-size:12.5px; color:var(--sub); margin:10px 0 4px; font-weight:600;}
  input[type=text], input[type=password], textarea, select{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:8px;
    font-family:inherit; font-size:13.5px; background:#fbfcfe; color:var(--ink);
  }
  textarea{resize:vertical;}
  input:focus, textarea:focus, select:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}
  .stage-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .stage-tab{
    padding:5px 12px; border-radius:8px; border:1px solid var(--line);
    background:#fbfcfe; cursor:pointer; font-size:12.5px; color:var(--sub);
  }
  .stage-tab.active{background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:700;}
  .scenario-grid{display:flex; flex-wrap:wrap; gap:6px;}
  .sc-btn{
    padding:5px 11px; border-radius:8px; border:1px solid var(--line);
    background:#fff; cursor:pointer; font-size:12.5px; color:var(--ink);
  }
  .sc-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .variant-box{margin-top:10px;}
  .variant-box select{font-size:13px;}
  .hint{font-size:12px; color:var(--warn); background:#fdf6ee; border:1px solid #f3e2cd; padding:7px 10px; border-radius:8px; margin-top:8px;}
  .plat-row{display:flex; flex-wrap:wrap; gap:6px 12px; padding:4px 0;}
  .plat-row label{display:flex; align-items:center; gap:4px; margin:0; font-weight:400; font-size:13px; color:var(--ink); cursor:pointer;}
  .btn{
    display:inline-block; padding:10px 22px; border:none; border-radius:9px;
    background:var(--accent); color:#fff; font-size:14.5px; font-weight:700; cursor:pointer;
  }
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn.secondary{background:#fff; color:var(--accent); border:1px solid var(--accent);}
  .btn.small{padding:6px 14px; font-size:13px; font-weight:600;}
  .toolbar{display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  .output{
    margin-top:12px; white-space:pre-wrap; word-break:break-word;
    background:#fbfcfe; border:1px solid var(--line); border-radius:8px;
    padding:14px; font-size:13.5px; min-height:120px; max-height:640px; overflow-y:auto;
  }
  .status{font-size:12.5px; color:var(--sub);}
  .status.ok{color:var(--ok);} .status.err{color:#c0392b;}
  details.tpl-view{margin-top:10px;}
  details.tpl-view summary{cursor:pointer; font-size:12.5px; color:var(--sub);}
  details.tpl-view textarea{margin-top:6px; font-size:12.5px; height:220px;}
  .modal-bg{position:fixed; inset:0; background:rgba(20,25,40,.45); display:none; align-items:center; justify-content:center; z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff; border-radius:14px; padding:22px; width:min(480px,92vw);}
  .modal h3{margin-bottom:12px; font-size:16px;}
  .modal .note{font-size:12px; color:var(--sub); margin-top:8px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span>Hi3D</span> KOL 郵件助手</h1>
    <div style="display:flex; gap:8px; align-items:center;">
      <span class="gear" id="packBadge" style="cursor:default;"></span>
      <div class="tabs">
        <button class="tab-btn active" data-tab="gen">✉️ 生成回覆</button>
        <button class="tab-btn" data-tab="trans">🌐 翻譯來信</button>
      </div>
      <button class="gear" onclick="openSettings()">⚙ 設定</button>
    </div>
  </header>

  <!-- ===== 生成回覆 ===== -->
  <div id="tab-gen">
    <div class="layout">
      <div>
        <div class="card">
          <h2>1️⃣ 選擇場景</h2>
          <div class="stage-tabs" id="stageTabs"></div>
          <div class="scenario-grid" id="scGrid"></div>
          <div class="variant-box hidden" id="variantBox">
            <label>話術變體</label>
            <select id="variantSel"></select>
          </div>
          <div class="variant-box hidden" id="sitBox">
            <label id="sitLabel">狀態選擇</label>
            <select id="sitSel"></select>
          </div>
          <div class="variant-box hidden" id="optBox">
            <label>選填模塊（勾選才會加入郵件）</label>
            <div class="plat-row" id="optRow"></div>
          </div>
          <div class="hint hidden" id="scHint"></div>
          <details class="tpl-view">
            <summary>📄 查看 / 臨時編輯模版原文（編輯只影響本次生成）</summary>
            <textarea id="tplRaw" spellcheck="false"></textarea>
          </details>
        </div>

        <div class="card" style="margin-top:16px;">
          <h2>2️⃣ 客制化模塊 <span style="font-weight:400;color:var(--sub);font-size:12px;">（留空的模塊將維持模版原文或自動省略）</span></h2>
          <label>達人稱呼（如：田中、MokoChannel）<span class="status" id="nameStatus" style="font-weight:400;"></span></label>
          <input type="text" id="fName" placeholder="留空則用「ご担当者 様」；貼上博主來信可自動識別">
          <label>合作形式（投稿類型）</label>
          <div class="plat-row" id="fmtRow">
            <label><input type="checkbox" value="長尺動画">長尺動画</label>
            <label><input type="checkbox" value="ハイライト短尺動画">ハイライト短尺動画（45〜90秒程度）</label>
            <label><input type="checkbox" value="ショート動画">ショート動画（45〜90秒程度）</label>
            <label><input type="checkbox" value="記事投稿">記事投稿</label>
          </div>
          <div class="plat-row hidden" id="durRow" style="padding-left:20px;">
            <span style="font-size:12px;color:var(--sub);">└ 長尺時長：</span>
            <label><input type="checkbox" value="5分程度">5分程度</label>
            <label><input type="checkbox" value="5-8分程度">5-8分程度</label>
            <label><input type="checkbox" value="10分程度以上">10分程度以上</label>
          </div>
          <label>合作平台</label>
          <div class="plat-row" id="platRow">
            <label><input type="checkbox" value="YouTube（長尺）">YT 長尺</label>
            <label><input type="checkbox" value="YouTube Shorts">YT Shorts</label>
            <label><input type="checkbox" value="TikTok">TikTok</label>
            <label><input type="checkbox" value="Instagram">Instagram</label>
            <label><input type="checkbox" value="X（旧Twitter）">X</label>
            <label><input type="checkbox" value="Note">Note</label>
            <label><input type="checkbox" value="Lemon8">Lemon8</label>
          </div>
          <label>日圓匯率換算（選填：博主提日圓報酬時，換算近一年美金區間輔助議價）</label>
          <div class="plat-row" style="align-items:center;">
            <input type="text" id="fJpyAmt" placeholder="輸入日圓金額，如 150000" style="max-width:180px; flex:none;">
            <span class="status" id="fxResult">匯率讀取中…</span>
          </div>
          <div class="toolbar" id="fxBtnRow" style="margin-top:6px;">
            <button type="button" class="btn secondary small" id="fxMinBtn" onclick="applyFx('min')" disabled>用最低匯率填入報價</button>
            <button type="button" class="btn secondary small" id="fxMaxBtn" onclick="applyFx('max')" disabled>用最高匯率填入報價</button>
          </div>
          <label>報價（基礎報酬＋階梯獎勵，中文或數字皆可）</label>
          <textarea id="fPrice" rows="3" placeholder="例：基本 $800；80萬播放 +$400（合計$1200）；120萬 +$700（合計$1500）；200萬 +$1200（合計$2000）&#10;或：置換合作（Pro 1個月無償提供）"></textarea>
          <div class="row">
            <div>
              <label>腳本提交日期（填最後一天）</label>
              <input type="text" id="fD1" placeholder="例：7/14 → 7月13日〜14日">
            </div>
            <div>
              <label>初稿確認日期（填最後一天）</label>
              <input type="text" id="fD2" placeholder="例：7/20 → 7月19日〜20日">
            </div>
            <div>
              <label>發布日期（填最後一天）</label>
              <input type="text" id="fD3" placeholder="例：7/23 → 7月22日〜23日">
            </div>
          </div>
          <label>博主來信原文（選填——貼上後 AI 會針對其內容和疑問逐條回應）</label>
          <textarea id="fLetter" rows="5" placeholder="貼上博主的日文/英文來信…"></textarea>
          <label>補充要求（中文描述你想怎麼回）</label>
          <textarea id="fExtra" rows="4" placeholder="例：博主嫌報價低，用「初次合作+已是最高報價」話術壓價，但語氣要更誠懇；順便回答他問的二次利用期限問題（6個月）"></textarea>
          <div class="toolbar">
            <button class="btn" id="genBtn" onclick="generate()">⚡ 生成日文郵件</button>
            <span class="status" id="genStatus"></span>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>3️⃣ 生成結果</h2>
          <div class="toolbar" style="margin-top:0;">
            <button class="btn secondary small" onclick="copyJP()">📋 複製日文郵件</button>
            <button class="btn secondary small" onclick="copyAll()">複製全部</button>
            <span class="status" id="copyStatus"></span>
          </div>
          <div class="output" id="genOut">選擇場景、填寫需求後點「生成」。結果會即時逐字輸出。</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 翻譯來信 ===== -->
  <div id="tab-trans" class="hidden">
    <div class="layout">
      <div class="card">
        <h2>貼上博主來信</h2>
        <textarea id="trIn" rows="16" placeholder="貼上日文（或英文）來信原文…"></textarea>
        <div class="toolbar">
          <button class="btn" id="trBtn" onclick="translateMail()">🌐 翻譯＋分析</button>
          <span class="status" id="trStatus"></span>
        </div>
      </div>
      <div class="card">
        <h2>中文翻譯＋要點分析</h2>
        <div class="toolbar" style="margin-top:0;">
          <button class="btn secondary small" onclick="copyTr()">📋 複製</button>
          <span class="status" id="trCopyStatus"></span>
        </div>
        <div class="output" id="trOut">翻譯結果將顯示：全文中譯、對方核心訴求、需要你決策的點、建議使用的回覆模版。</div>
      </div>
    </div>
  </div>
</div>

<!-- 設定 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>⚙ 設定</h3>
    <label>DeepSeek API Key（留空則使用內建 key）</label>
    <input type="password" id="setKey" placeholder="已內建預設 key，可留空">
    <label>郵件簽名</label>
    <input type="text" id="setSign" placeholder="あかね / Hi3D AI - APAC Marketing">
    <div class="note">工具已內建團隊共用 key，打開即用。此處填入新 key 可覆蓋內建值（存於本機瀏覽器）。注意：拿到此檔案的人都能取出內建 key，請只在團隊內部傳閱。</div>
    <div class="toolbar">
      <button class="btn" onclick="saveSettings()">儲存</button>
      <button class="btn secondary" onclick="closeSettings()">關閉</button>
    </div>
  </div>
</div>

<script src="templates-jp.js"></script>
<script>
/* ================= 模版包載入（模版內容在 templates-*.js） ================= */
const PACKS = window.TEMPLATE_PACKS || {};
const packKeys = Object.keys(PACKS);
if(packKeys.length === 0){
  alert("未載入任何模版包：請確認 templates-jp.js 與 index.html 放在同一資料夾。");
}
let curPackKey = localStorage.getItem("dsPack");
if(packKeys.indexOf(curPackKey) === -1) curPackKey = packKeys[0];
const PACK = PACKS[curPackKey] || {label:"（無模版包）", langName:"日文", styleRule:"", stages:[], optModules:{}, templates:[], knowledge:""};
const STAGES = PACK.stages;
const TEMPLATES = PACK.templates;
const KNOWLEDGE = PACK.knowledge;

/* ================= 狀態 ================= */
const DEFAULT_KEY = "sk-e675e533cd0a4a45bd24c487d9c4c1e8"; // 內嵌預設 key，設定視窗填入新 key 可覆蓋
let curStage = 0, curTpl = null, curVar = 0;
const $ = id => document.getElementById(id);

function initStages(){
  const box = $("stageTabs");
  STAGES.forEach((s,i)=>{
    const b = document.createElement("button");
    b.className = "stage-tab" + (i===0?" active":"");
    b.textContent = s;
    b.onclick = ()=>{ curStage=i; document.querySelectorAll(".stage-tab").forEach((x,j)=>x.classList.toggle("active",j===i)); renderScenarios(); };
    box.appendChild(b);
  });
  renderScenarios();
}
function renderScenarios(){
  const g = $("scGrid"); g.innerHTML = "";
  TEMPLATES.filter(t=>t.stage===curStage).forEach(t=>{
    const b = document.createElement("button");
    b.className = "sc-btn" + (curTpl && curTpl.id===t.id ? " active":"");
    b.textContent = t.name;
    b.onclick = ()=>selectTpl(t, b);
    g.appendChild(b);
  });
}
function selectTpl(t, btn){
  curTpl = t; curVar = 0;
  resetCustomFields();
  document.querySelectorAll(".sc-btn").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
  const vb = $("variantBox"), vs = $("variantSel");
  if(t.variants.length > 1){
    vb.classList.remove("hidden");
    vs.innerHTML = t.variants.map((v,i)=>`<option value="${i}">${v.name}</option>`).join("");
    vs.onchange = ()=>{ curVar = +vs.value; buildTplRaw(); };
  } else vb.classList.add("hidden");
  const ob = $("optBox"), or = $("optRow");
  if(t.optionals){
    ob.classList.remove("hidden");
    or.innerHTML = t.optionals.map((o,i)=>`<label><input type="checkbox" value="${i}" onchange="buildTplRaw()">${o.label}</label>`).join("");
  } else { ob.classList.add("hidden"); or.innerHTML = ""; }
  const sb = $("sitBox"), ss = $("sitSel");
  if(t.situations){
    sb.classList.remove("hidden");
    $("sitLabel").textContent = t.situations.label;
    ss.innerHTML = t.situations.options.map((o,i)=>`<option value="${i}">${o.name}</option>`).join("");
    ss.onchange = buildTplRaw;
  } else sb.classList.add("hidden");
  const h = $("scHint");
  if(t.hint){ h.textContent = "💡 " + t.hint; h.classList.remove("hidden"); } else h.classList.add("hidden");
  buildTplRaw();
}
const CIRCLED = "①②③④⑤⑥⑦⑧⑨⑩⑪⑫";
function buildTplRaw(){
  if(!curTpl) return;
  let body = curTpl.variants[curVar].body;
  if(curTpl.situations){
    const si = +($("sitSel").value || 0);
    body = body.replace("{{SITUATION}}", curTpl.situations.options[si].body);
  }
  if(curTpl.optionals){
    const checked = [...document.querySelectorAll("#optRow input:checked")].map(c=>+c.value);
    const base = body.split("{{OPTIONS}}")[0];
    let n = 0;
    for(let i=0;i<CIRCLED.length;i++){ if(base.includes(CIRCLED[i])) n = i+1; }
    const parts = checked.map(idx=>{
      const m = curTpl.optionals[idx];
      if(m.numbered === false) return m.body;
      n++;
      return (CIRCLED[n-1] || "■") + " " + m.body;
    });
    body = body.replace(/\n?\{\{OPTIONS\}\}\n?/, parts.length ? "\n\n" + parts.join("\n\n") + "\n\n" : "\n\n").replace(/\n{3,}/g, "\n\n");
  }
  $("tplRaw").value = body;
}

/* ================= 重新選擇場景時重置客制化欄位 ================= */
function resetCustomFields(){
  $("fName").value = "";
  $("nameStatus").textContent = "";
  document.querySelectorAll("#fmtRow input").forEach(c=>c.checked=false);
  document.querySelectorAll("#durRow input").forEach(c=>c.checked=false);
  $("durRow").classList.add("hidden");
  document.querySelectorAll("#platRow input").forEach(c=>c.checked=false);
  $("fJpyAmt").value = "";
  updateFxCalc();
  $("fPrice").value = "";
  $("fD1").value = ""; $("fD2").value = ""; $("fD3").value = "";
  $("fLetter").value = "";
  $("fExtra").value = "";
  $("genOut").textContent = "選擇場景、填寫需求後點「生成」。結果會即時逐字輸出。";
  $("genStatus").textContent = "";
}

/* ================= Tabs ================= */
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    $("tab-gen").classList.toggle("hidden", b.dataset.tab!=="gen");
    $("tab-trans").classList.toggle("hidden", b.dataset.tab!=="trans");
  };
});

/* ================= 設定 ================= */
function openSettings(){ $("setKey").value = localStorage.getItem("dsKey")||""; $("setSign").value = localStorage.getItem("dsSign")||""; $("modalBg").classList.add("show"); }
function closeSettings(){ $("modalBg").classList.remove("show"); }
function saveSettings(){
  localStorage.setItem("dsKey", $("setKey").value.trim());
  localStorage.setItem("dsSign", $("setSign").value.trim());
  closeSettings();
}
$("modalBg").addEventListener("click", e=>{ if(e.target===$("modalBg")) closeSettings(); });

/* ================= DeepSeek 串流呼叫 ================= */
async function callDeepSeek(messages, outEl, statusEl, btnEl){
  const key = localStorage.getItem("dsKey") || DEFAULT_KEY;
  if(!key){ statusEl.textContent = "請先到 ⚙ 設定 填入 DeepSeek API Key"; statusEl.className="status err"; openSettings(); return null; }
  btnEl.disabled = true; statusEl.className="status"; statusEl.textContent = "生成中…";
  outEl.textContent = "";
  try{
    const res = await fetch("https://api.deepseek.com/chat/completions",{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
      body: JSON.stringify({ model:"deepseek-chat", messages, stream:true, temperature:1.0 })
    });
    if(!res.ok){
      const t = await res.text();
      throw new Error("API 錯誤 " + res.status + "：" + t.slice(0,300));
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "", full = "";
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split("\n");
      buf = lines.pop();
      for(const line of lines){
        const s = line.trim();
        if(!s.startsWith("data:")) continue;
        const payload = s.slice(5).trim();
        if(payload === "[DONE]") continue;
        try{
          const j = JSON.parse(payload);
          const d = j.choices?.[0]?.delta?.content;
          if(d){ full += d; outEl.textContent = full; outEl.scrollTop = outEl.scrollHeight; }
        }catch(e){}
      }
    }
    statusEl.textContent = "✅ 完成"; statusEl.className = "status ok";
    return full;
  }catch(err){
    statusEl.textContent = "❌ " + err.message; statusEl.className = "status err";
    if(!outEl.textContent) outEl.textContent = "生成失敗：" + err.message;
    return null;
  }finally{ btnEl.disabled = false; }
}

/* ================= 自動識別博主名字 ================= */
let detectingName = false;
async function detectName(){
  const letter = $("fLetter").value.trim();
  if(!letter || $("fName").value.trim() || detectingName) return;
  const key = localStorage.getItem("dsKey") || DEFAULT_KEY;
  if(!key) return;
  const st = $("nameStatus");
  detectingName = true; st.textContent = "｜識別名字中…"; st.className = "status";
  try{
    const res = await fetch("https://api.deepseek.com/chat/completions",{
      method:"POST",

/* ================= 日圓匯率換算（近一年 USD/JPY 最低〜最高區間） ================= */
const FX_CACHE_KEY = "dsFxJpyUsdRange";
const FX_CACHE_TTL = 24*60*60*1000; // 24小時
let fxRange = null; // {min, max, ts}
async function loadFxRange(){
  try{
    const cached = JSON.parse(localStorage.getItem(FX_CACHE_KEY) || "null");
    if(cached && (Date.now() - cached.ts) < FX_CACHE_TTL){ fxRange = cached; updateFxCalc(); return; }
    const end = new Date();
    const start = new Date(); start.setDate(start.getDate() - 365);
    const fmt = d => d.toISOString().slice(0,10);
    const res = await fetch(`https://api.frankfurter.dev/v1/${fmt(start)}..${fmt(end)}?from=JPY&to=USD`);
    if(!res.ok) throw new Error("匯率 API 錯誤 " + res.status);
    const j = await res.json();
    const rates = Object.values(j.rates || {}).map(r=>r.USD).filter(v=>typeof v === "number");
    if(!rates.length) throw new Error("無匯率資料");
    fxRange = { min: Math.min(...rates), max: Math.max(...rates), ts: Date.now() };
    localStorage.setItem(FX_CACHE_KEY, JSON.stringify(fxRange));
  }catch(e){
    fxRange = null;
    $("fxResult").textContent = "匯率讀取失敗，可手動輸入報價";
  }
  updateFxCalc();
}
function updateFxCalc(){
  const el = $("fxResult");
  const amt = parseFloat($("fJpyAmt").value);
  if(!fxRange){ if(el.textContent!=="匯率讀取失敗，可手動輸入報價") el.textContent = "匯率讀取中…"; $("fxMinBtn").disabled = true; $("fxMaxBtn").disabled = true; return; }
  if(!amt || amt <= 0){
    el.textContent = `近一年 USD/JPY 匯率區間：1 JPY ≈ ${fxRange.min.toFixed(5)}〜${fxRange.max.toFixed(5)} USD`;
    $("fxMinBtn").disabled = true; $("fxMaxBtn").disabled = true;
    return;
  }
  const lo = Math.round(amt * fxRange.min);
  const hi = Math.round(amt * fxRange.max);
  el.textContent = `→ 換算：約 $${lo} 〜 $${hi}（近一年匯率區間）`;
  $("fxMinBtn").disabled = false; $("fxMaxBtn").disabled = false;
}
$("fJpyAmt").addEventListener("input", updateFxCalc);
function applyFx(kind){
  if(!fxRange) return;
  const amt = parseFloat($("fJpyAmt").value);
  if(!amt || amt <= 0) return;
  const rate = kind === "min" ? fxRange.min : fxRange.max;
  const usd = Math.round(amt * rate);
  const line = `基本報酬：$${usd}（換算自 ¥${amt.toLocaleString()}，採近一年${kind==="min"?"最低":"最高"}匯率 1 JPY≈${rate.toFixed(5)} USD）`;
  const cur = $("fPrice").value.trim();
  $("fPrice").value = cur ? cur + "\n" + line : line;
}

/* ================= 日期自動回推（填最後一天 → 前一天〜當天） ================= */
function expandDate(s){
  s = (s||"").trim();
  if(!s) return "";
  const m = s.match(/^(?:(\d{4})[\/\.年])?(\d{1,2})[\/\.月](\d{1,2})日?$/);
  if(!m) return s; /* 已是範圍或其他寫法，原樣使用 */
  const y = m[1] ? +m[1] : new Date().getFullYear();
  const end = new Date(y, +m[2]-1, +m[3]);
  if(isNaN(end.getTime())) return s;
  const start = new Date(y, +m[2]-1, +m[3]-1);
  if(start.getMonth() === end.getMonth())
    return (end.getMonth()+1) + "月" + start.getDate() + "日〜" + end.getDate() + "日";
  return (start.getMonth()+1) + "月" + start.getDate() + "日〜" + (end.getMonth()+1) + "月" + end.getDate() + "日";
}

function doCopy(text, statusEl){
  navigator.clipboard.writeText(text).then(()=>{
    statusEl.textContent = "已複製 ✅"; statusEl.className = "status ok";
    setTimeout(()=>statusEl.textContent="", 2000);
  }).catch(()=>{ statusEl.textContent = "複製失敗，請手動選取"; statusEl.className = "status err"; });
}

  t = t.replace(/^【件名】/m, "件名：").replace(/^【本文】\s*/m, "").trim();
  doCopy(t, $("copyStatus"));
}
